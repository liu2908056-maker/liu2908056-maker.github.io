<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>我的第一个网页</title>
  <style>
    /* CSS 写在这里，控制样式 */
    body {
      font-family: sans-serif;
      background: #f0f4ff;
      text-align: center;
      padding: 50px;
    }
    h1 { color: #3355ff; }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- HTML 是内容结构 -->
  <h1>你好，世界！</h1>
  <p>这是我用 GitHub Pages 发布的第一个网页。</p>
  <button onclick="sayHello()">点我</button>

  <script>
    // JavaScript 是逻辑，类似 C 的函数
    function sayHello() {
      alert("Hello from my webpage!");
    }
  </script>
</body>
</html>
